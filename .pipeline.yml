variables:
  FF_SCRIPT_SECTIONS: "true"
  GIT_CLONE_PATH: "${CI_BUILDS_DIR}/${CI_JOB_ID}/${CI_PIPELINE_ID}/${CI_PROJECT_NAME}"
  VAULT_AUTH_ROLE_SIDEKIQ: "sidekiq_pro_ro"
  WAIT_FOR_SERVICES_TIMEOUT: "120"

include:
  - component: $CI_SERVER_FQDN/devops/gitlab/components/docker/stage_build@~latest
    inputs:
      job_image_tag: "29-dind"
      docker_build_context: "rails_app/"
      docker_build_secrets: "--secret id=sidekiq_pro_credentials,env=SIDEKIQ_PRO_CREDENTIALS"
      docker_target: "base"
      dockerfile_path: "rails_app/"
      job_suffix: "_base"
      stage: "build_base"

  - component: $CI_SERVER_FQDN/devops/gitlab/components/docker/stage_build@~latest
    inputs:
      job_image_tag: "29-dind"
      docker_build_context: "rails_app/"
      docker_build_secrets: "--secret id=sidekiq_pro_credentials,env=SIDEKIQ_PRO_CREDENTIALS"
      docker_target: "development"
      dockerfile_path: "rails_app/"
      job_suffix: "_development"
      needs_build:
        - "amend_manifest_base"
      stage: "build_development"

  - component: $CI_SERVER_FQDN/devops/gitlab/components/docker/stage_build@~latest
    inputs:
      job_image_tag: "29-dind"
      docker_build_context: "rails_app/"
      docker_build_secrets: "--secret id=sidekiq_pro_credentials,env=SIDEKIQ_PRO_CREDENTIALS"
      docker_target: "production"
      dockerfile_path: "rails_app/"
      job_suffix: "_production"
      needs_build:
        - "amend_manifest_base"
      stage: "build_production"
      amend_tag_with_docker_target: "false"

  - component: $CI_SERVER_FQDN/devops/gitlab/components/sast/trivy@~latest
    inputs:
      docker_tag_to_scan: "${CI_COMMIT_SHA}"
      job_image_tag: "29-dind"
      needs:
        - "amend_manifest_production"
      stage: "test"

  - component: $CI_SERVER_FQDN/devops/gitlab/components/docker/stage_finalize@~latest
    inputs:
      job_image_tag: "29-dind"
      needs_copy:
        - trivy_scan
        - rspec
        - rubocop
  - component: $CI_SERVER_FQDN/devops/gitlab/components/tests/rubocop@~latest
    inputs:
      app_dir: "rails_app"

  - component: $CI_SERVER_FQDN/devops/gitlab/components/tests/rspec@~latest
    inputs:
      needs:
        - "amend_manifest_development"
      service_solr_collection_name: "finding-aid-discovery-test"
      service_solr_configset_name: "finding-aid-discovery"

  - component: $CI_SERVER_FQDN/devops/gitlab/components/deploy/deploy@~latest
    inputs:
      deploy_environment_url: "https://findingaids-staging.library.upenn.edu"
      deploy_host: "${DEPLOY_HOST}"
      valid_principals: "${VALID_PRINCIPALS}"
      vault_auth_role: "${VAULT_AUTH_ROLE}"
      vault_ssh_client_role: "${VAULT_SSH_CLIENT_ROLE}"

  - component: $CI_SERVER_FQDN/devops/gitlab/components/deploy/deploy@~latest
    inputs:
      deploy_environment: "production"
      deploy_environment_url: "https://findingaids.library.upenn.edu"
      deploy_host: "${DEPLOY_HOST}"
      job_suffix: "production"
      valid_principals: "${VALID_PRINCIPALS}"
      vault_auth_role: "${VAULT_AUTH_ROLE}"
      vault_ssh_client_role: "${VAULT_SSH_CLIENT_ROLE}"
  - component: gitlab.library.upenn.edu/devops/gitlab/components/general/vault_jwt_auth@~latest
    inputs:
      vault_auth_role: "${VAULT_AUTH_ROLE}"
  - component: gitlab.library.upenn.edu/devops/gitlab/components/general/install_hashicorp_vault@~latest

workflow:
  rules:
  - when: always

stages:
  - build_base
  - build_development
  - build_production
  - test
  - finalize
  - deploy

build_and_push_docker_images_base:
  extends:
    - .vault_jwt_auth
  before_script:
    - !reference [.install_hashicorp_vault, before_script]
    - !reference [.vault_jwt_auth, before_script]
    - !reference [.auth_gitlab_registry, before_script]
    - export SIDEKIQ_PRO_CREDENTIALS="$(vault kv get -field=credentials ${VAULT_SIDEKIQ_ENDPOINT})"
  variables:
    VAULT_AUTH_ROLE: ${VAULT_AUTH_ROLE_SIDEKIQ}

build_and_push_docker_images_development:
  extends:
    - .vault_jwt_auth
  before_script:
    - !reference [.install_hashicorp_vault, before_script]
    - !reference [.vault_jwt_auth, before_script]
    - !reference [.auth_gitlab_registry, before_script]
    - export SIDEKIQ_PRO_CREDENTIALS="$(vault kv get -field=credentials ${VAULT_SIDEKIQ_ENDPOINT})"
  variables:
    VAULT_AUTH_ROLE: ${VAULT_AUTH_ROLE_SIDEKIQ}

build_and_push_docker_images_production:
  extends:
    - .vault_jwt_auth
  before_script:
    - !reference [.install_hashicorp_vault, before_script]
    - !reference [.vault_jwt_auth, before_script]
    - !reference [.auth_gitlab_registry, before_script]
    - export SIDEKIQ_PRO_CREDENTIALS="$(vault kv get -field=credentials ${VAULT_SIDEKIQ_ENDPOINT})"
  variables:
    VAULT_AUTH_ROLE: ${VAULT_AUTH_ROLE_SIDEKIQ}

deploy_staging:
  needs:
    - copy_docker_images
  only:
    - main

deploy_production:
  needs:
    - copy_docker_images
  rules:
    - if: $CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+(\.[a-zA-Z0-9]+)?$/
