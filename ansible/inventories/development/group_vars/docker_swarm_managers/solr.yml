---
solr_collections:
  - name: finding-aid-discovery-development
    configset: finding-aid-discovery
    replicas: 1
    shards: 1
  - name: finding-aid-discovery-test
    configset: finding-aid-discovery
    replicas: 1
    shards: 1

solr_configsets:
  - name: "finding-aid-discovery"
    path: "/home/app/rails_app/solr/conf/"

solr_docker_image_tag: 9.3.0

solr_proxy_host: "findingaids-dev.library.upenn.int"

solr_instances: 1

solr_collection_replicas: 1

solr_custom_env_variables:
  SOLR_ENABLE_AUTHENTICATION: "yes"
  SOLR_ADMIN_USERNAME: "admin"
  SOLR_ADMIN_PASSWORD: "password"
  SOLR_MODULES: "analysis-extras"