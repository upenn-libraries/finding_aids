---
- name: Configure Docker Buildkit daemon
  block:
    - name: Create Buildkit daemon configuration directory
      ansible.builtin.file:
        path: "{{ finding_aid_discovery_docker_buildx_config_path }}"
        state: directory
        owner: root
        group: root
        mode: "0755"
    - name: Create configuration file
      ansible.builtin.copy:
        content: |
          [registry."docker.io"]
            mirrors = ["registry-mirror.library.upenn.int:5000"]
            http = true
            insecure = true
          [registry."registry-mirror.library.upenn.int:5000"]
            http = true
            insecure = true
        dest: "{{ finding_aid_discovery_docker_buildx_config }}"
        owner: root
        group: root
        mode: "0644"

- name: Create custom docker image
  community.docker.docker_image_build:
    name: "{{ finding_aid_discovery_docker_image_name }}"
    tag: "{{ finding_aid_discovery_docker_image_tag }}"
    path: "/home/app/rails_app"
    dockerfile: "/home/app/rails_app/Dockerfile"
    outputs:
      - type: image
    target: "development"
    secrets:
      - id: sidekiq_pro_credentials
        type: value
        value: "{{ dld_sidekiq_pro_vault_values.secret.credentials }}"
    rebuild: "{{ 'always' if (finding_aid_discovery_build_docker_image | default(false, true)) else 'never' }}"
    args:
      RAILS_ENV: "{{ finding_aid_discovery_rails_env }}"
    cache_from:
      - "{{ finding_aid_discovery_docker_image_name }}:{{ finding_aid_discovery_docker_image_tag }}"
  environment:
    BUILDX_CONFIG: "{{ finding_aid_discovery_docker_buildx_config_path }}"
