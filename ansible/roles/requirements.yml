---
collections:
  - name: community.docker

roles:
  # the original repo can't handle python3 so we will use a fork until it can
  - name: docker-swarm
    src: https://gitlab.library.upenn.edu/devops/ansible/roles/docker-swarm.git
    scm: git
    version: main

  - name: postgres
    src: https://gitlab.library.upenn.edu/devops/ansible/roles/postgres.git
    scm: git
    version: main

  - name: traefik
    src: https://gitlab.library.upenn.edu/devops/ansible/roles/traefik.git
    scm: git
    version: sans_requests

  - name: redis
    src: https://gitlab.library.upenn.edu/devops/ansible/roles/redis.git
    scm: git
    version: 1.2.1

  - name: solr
    src: https://gitlab.library.upenn.edu/devops/ansible/roles/solr.git
    scm: git
    version: vendor_image
